name: Test

on:
  pull_request:

jobs:
  lint:
    name: clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: seanaye
          extraPullNames: nix-community
          authToken: '${{ secrets.cachix }}'
          useDaemon: true
          skipPush: false

      - name: Run lint checks (via crane, skip cached)
        run: |
          nix run .#nix-fast-build -- \
            --flake ".#checks.x86_64-linux" \
            --systems x86_64-linux \
            --no-nom \
            --skip-cached \
            --cachix-cache seanaye

  test:
    name: test (nextest via archive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: seanaye
          extraPullNames: nix-community
          authToken: '${{ secrets.cachix }}'
          useDaemon: true
          skipPush: false

      - name: Build uncached nextest archive dependencies (inside Nix sandbox)
        run: |
          nix run .#nix-fast-build -- \
            --flake ".#packages.x86_64-linux.nextestArchive" \
            --systems x86_64-linux \
            --no-nom \
            --skip-cached \
            --cachix-cache seanaye \
            --no-link

      - name: Materialize nextest archive
        run: nix build .#nextestArchive -o nextest-result --print-build-logs

      - name: Run tests from archive
        run: |
          ARCHIVE="$(readlink -f nextest-result)/archive.tar.zst"
          nix develop --command cargo nextest run \
            --archive-file "$ARCHIVE" \
            --workspace-remap "$PWD"
